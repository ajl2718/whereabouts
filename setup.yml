data:
    db_name: au_all_sm
    folder: geodb
    filepath: 'GNAF_CORE_neat.parquet'
    sep: ","
geocoder:
    matchers: [standard]
    states: [WA, SA, NT, QLD, NSW, ACT, VIC, TAS]
schema:
    addr_id: address_id
    full_address: ADDRESS_LABEL
    address_site_name: ADDRESS_SITE_NAME
    locality_name: LOCALITY_NAME
    postcode: POSTCODE
    state: STATE
    latitude: LATITUDE
    longitude: LONGITUDE